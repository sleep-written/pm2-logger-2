@let opened = this.opened();

<mat-toolbar
class="mat-text-on-primary mat-bg-primary">
  <button mat-icon-button
  class="mat-text-on-primary"
  (click)="this.opened.set(!opened)">
    <mat-icon>menu</mat-icon>
  </button>

  <a routerLink="/"
  class="mat-text-on-primary">
    <h2>PM2 Logger</h2>
  </a>
</mat-toolbar>

<mat-sidenav-container
[hasBackdrop]="true"
(backdropClick)="this.opened.set(false)">
  <mat-sidenav
  mode="side"
  class="mat-text-surface-variant mat-bg-surface-variant"
  [opened]="opened">
    <app-sidenav
    (navigationEnd)="this.opened.set(false)">
    </app-sidenav>
  </mat-sidenav>

  <mat-sidenav-content>
    <router-outlet>
    </router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
